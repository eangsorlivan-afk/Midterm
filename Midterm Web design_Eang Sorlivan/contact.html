<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>

    <style>
        body{
            font-family: Arial;
            background: white;
        }

        header{
            color:black;
            text-align: center;
            padding: 10px;
        }
        footer{
            background: burlywood;
            color: white;
            text-align: center;
            padding: 10px;
        }
        nav a{
            color: black;
            margin: 10px;
            text-decoration: none;
        }

        .box{
            display: flex;
            margin: 20px;
        }

        .info{
            width: 50%;
            background: white;
            border: 1px solid black;
            border-radius: 10px;
            box-shadow: 2px 2px 5px gray;
            padding: 15px;
            margin: 10px;
        }
        .form{
            width: 50%;
            background: white;
            border: 1px solid black;
            border-radius: 10px;
            box-shadow: 2px 2px 5px gray;
            padding: 15px;
            margin: 10px;
        }
        input, textarea{
            width: 95%;
            margin: 5px 0;
        }

        button:hover{
            background: lightblue;
        }

        .map{
            margin: 20px;
            padding: 40px;
            text-align: center;
            background: white;
            border: 1px solid black;
            border-radius: 10px;
            box-shadow: 2px 2px 5px gray;
        }
    </style>

</head>
<body>

<header>
    <h1>Contact</h1>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<div class="box">

    <div class="info">
        <h2>Contact Information</h2>

        <p>Address: Toul kork, Phnom Penh</p>
        <p>Phone: 011350227</p>
        <p>Email: livan@email.com</p>
        <p>Working Hours: 8am-11am Mon - Fri</p>
    </div>

    <div class="form">
        <h2>Contact Form</h2>

        <input type="text" placeholder="Name"><br>
        <input type="email" placeholder="Email"><br>
        <input type="text" placeholder="Subject"><br>
        <textarea placeholder="Message"></textarea><br>

        <button>Send</button>
    </div>

</div>

<div class="map">
    Google Map Here
</div>

<footer>
    <p>Facebook | Instagram | Twitter</p>
    <p>&copy; 2026 Design by Eang Sorlivan</p>
</footer>

</html>
