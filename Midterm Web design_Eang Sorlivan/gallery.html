<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <style>
        .image{
             display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
         .image1{
            width: 20%;
            padding: 20px;
            background-color: lightgrey;
            border: 1px solid;
            text-align: center;
            font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            margin: 20px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 8px gray;
            justify-content: center;
        }
        .image img{
            width:350px;
            height: 400px;
        }
        img:hover{
            width: 50%;
            height: 50%;
            object-fit: cover;
            transition: tranform cubic-bezier(0.075, 0.82, 0.165, 1);
        }
        h1{
            text-align: center;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            color: brown;
        }
        footer{
            background: burlywood;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Welcome to Gallery</h1>
